description = "Search long-term memory for relevant context. Always pass a query matching the topic being discussed. Call with no arguments only at the start of a conversation to load preferences and recent activity."
keywords = ["memory", "recall", "search", "find", "retrieve", "remember", "context", "load"]

[[parameters]]
name = "query"
type = "string"
description = "Keyword search against memory content (e.g. 'employer', 'dark mode', 'api key'). Omit only to load full context at conversation start."
required = false

[[parameters]]
name = "type"
type = "string"
description = "Filter by type: 'fact', 'preference', 'event', 'note'"
required = false

[[parameters]]
name = "limit"
type = "int"
description = "Maximum number of memories to return for keyword searches (default: 10)"
required = false
