description = "Store information in long-term memory for future reference"
keywords = ["memory", "remember", "store", "save", "persist"]

[[parameters]]
name = "content"
type = "string"
description = "The information to remember"
required = true

[[parameters]]
name = "type"
type = "string"
description = "Category: 'fact', 'preference', 'event', or 'note' (default: 'note')"
required = false

[[parameters]]
name = "importance"
type = "float"
description = "Importance 0.0-1.0; higher values survive compaction longer (default: 0.5). Use 0.9 for critical facts, 0.5 for general notes."
required = false
