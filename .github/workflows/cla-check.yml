on:
  pull_request_target:
    types: [opened, reopened, synchronize]

jobs:
  cla-check:
    name: Check CLA status
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Run CLA check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CLA_TOKEN }}
          script: |
            const username = context.payload.pull_request.user.login.toLowerCase();
            const issue_number = context.payload.pull_request.number;
            const { owner, repo } = context.repo;

            const contributors = new Set(
              JSON.parse(require('fs').readFileSync('.clabot.json', 'utf8'))
                .contributors.map(u => u.toLowerCase())
            );

            const hasSigned = contributors.has(username);

            const desired = hasSigned ? 'cla: ok' : 'cla: required';
            const undesired = hasSigned ? 'cla: required' : 'cla: ok';

            const { data: labels } = await github.rest.issues.listLabelsOnIssue({ owner, repo, issue_number });
            const names = labels.map(l => l.name);

            if (!names.includes(desired)) {
              await github.rest.issues.addLabels({ owner, repo, issue_number, labels: [desired] });
            }
            if (names.includes(undesired)) {
              await github.rest.issues.removeLabel({ owner, repo, issue_number, name: undesired });
            }

            const MARKER = '<!-- CLA-MISSING-MARKER -->';

            if (!hasSigned) {
              const CLA_URL = 'https://forms.gle/dVYXv5geiZGmR1KG9';
              const message = [
                MARKER,
                `Thanks for your contribution, @${username}!`,
                '',
                'Before we can review this pull request, you need to accept the Contributor License Agreement (CLA).',
                '',
                `Please read and sign the CLA here: ${CLA_URL}`,
                '',
                'Once you have signed, a maintainer will add your GitHub username to the `.clabot.json` file and this PR will automatically update.'
              ].join('\n');

              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              const existing = comments.find(c => c.body?.includes(MARKER));

              if (existing) {
                await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: message });
              } else {
                await github.rest.issues.createComment({ owner, repo, issue_number, body: message });
              }

              core.setFailed(`CLA not signed for user ${username}`);
            } else {
              const { data: comments } = await github.rest.issues.listComments({ owner, repo, issue_number, per_page: 100 });
              const existing = comments.find(c => c.body?.includes(MARKER));
              if (existing) {
                await github.rest.issues.deleteComment({ owner, repo, comment_id: existing.id });
              }
            }
